<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello ITST2024</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Outfit:wght@300;600&display=swap" rel="stylesheet">
    <style>
        /* --- RESET & BASIC SETUP --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0f0c29 100%);
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        /* --- BACKGROUND CANVAS --- */
        #networkCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* --- MAIN CONTAINER (GLASSMORPHISM) --- */
        .container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 800px;
            padding: 3rem;
            
            /* Glass Effect */
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            animation: floatUp 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        /* --- TYPOGRAPHY & DESIGN --- */
        h1 {
            font-family: 'Cinzel', serif;
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #fff 0%, #a6c0fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(166, 192, 254, 0.3);
        }

        .sub-header {
            font-size: 1.2rem;
            color: #a0a0a0;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 1rem;
            display: inline-block;
        }

        p.greeting-text {
            font-size: 1.25rem;
            line-height: 1.6;
            color: #e0e0e0;
            margin-bottom: 2rem;
        }

        .class-badge {
            display: inline-block;
            padding: 10px 30px;
            border-radius: 50px;
            background: linear-gradient(90deg, #FF9966, #FF5E62);
            color: white;
            font-weight: bold;
            font-size: 1.5rem;
            box-shadow: 0 0 20px rgba(255, 94, 98, 0.6);
            animation: glow 2s ease-in-out infinite alternate;
        }

        /* --- DECORATIVE ELEMENTS --- */
        .divider {
            height: 2px;
            width: 100px;
            background: linear-gradient(90deg, transparent, #fff, transparent);
            margin: 2rem auto;
        }

        /* --- ANIMATIONS --- */
        @keyframes floatUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes glow {
            from {
                box-shadow: 0 0 10px rgba(255, 94, 98, 0.4);
            }
            to {
                box-shadow: 0 0 30px rgba(255, 94, 98, 0.9), 0 0 60px rgba(255, 94, 98, 0.4);
            }
        }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .container { padding: 1.5rem; }
            p.greeting-text { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <canvas id="networkCanvas"></canvas>

    <div class="container">
        <div class="sub-header">Greetings from the Digital Realm</div>
        
        <h1>Hello, ITST2024</h1>
        
        <div class="divider"></div>
        
        <p class="greeting-text">
            May your algorithms be efficient, your pixels perfect, and your coffee endless.
            <br>
            Welcome to a semester of innovation, discovery, and high-end computing.
        </p>

        <div class="class-badge">ITST2024</div>
        
        <div style="margin-top: 20px; font-size: 0.8rem; opacity: 0.5;">
            Designed with <span style="color:#FF5E62">♥</span> & Code
        </div>
    </div>

    <script>
        /**
         * HIGH-END PARTICLE NETWORK ANIMATION
         * Creates a constellation effect representing data nodes.
         */
        const canvas = document.getElementById('networkCanvas');
        const ctx = canvas.getContext('2d');
        
        let particlesArray;
        
        // Handle resizing
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            init();
        });

        // Mouse interaction
        let mouse = {
            x: null,
            y: null,
            radius: (canvas.height/80) * (canvas.width/80)
        }

        window.addEventListener('mousemove', (event) => {
            mouse.x = event.x;
            mouse.y = event.y;
        });

        // Particle Class
        class Particle {
            constructor(x, y, directionX, directionY, size, color) {
                this.x = x;
                this.y = y;
                this.directionX = directionX;
                this.directionY = directionY;
                this.size = size;
                this.color = color;
            }
            
            // Draw method
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.fillStyle = '#ffffff'; // White dots
                ctx.fill();
            }
            
            // Update method
            update() {
                // Check if particle is still within canvas
                if (this.x > canvas.width || this.x < 0) {
                    this.directionX = -this.directionX;
                }
                if (this.y > canvas.height || this.y < 0) {
                    this.directionY = -this.directionY;
                }
                
                // Check collision detection - mouse position / particle position
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx*dx + dy*dy);
                
                if (distance < mouse.radius + this.size){
                    if (mouse.x < this.x && this.x < canvas.width - this.size * 10) {
                        this.x += 3;
                    }
                    if (mouse.x > this.x && this.x > this.size * 10) {
                        this.x -= 3;
                    }
                    if (mouse.y < this.y && this.y < canvas.height - this.size * 10) {
                        this.y += 3;
                    }
                    if (mouse.y > this.y && this.y > this.size * 10) {
                        this.y -= 3;
                    }
                }
                
                // Move particle
                this.x += this.directionX;
                this.y += this.directionY;
                
                this.draw();
            }
        }

        // Create particle array
        function init() {
            particlesArray = [];
            let numberOfParticles = (canvas.height * canvas.width) / 9000;
            for (let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 2) + 1;
                let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
                let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
                let directionX = (Math.random() * 2) - 1; // Speed
                let directionY = (Math.random() * 2) - 1;
                let color = '#ffffff';
                
                particlesArray.push(new Particle(x, y, directionX, directionY, size, color));
            }
        }

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0,0,innerWidth, innerHeight);
            
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
            }
            connect();
        }

        // Draw lines between particles that are close enough
        function connect() {
            let opacityValue = 1;
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x))
                    + ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));
                    
                    if (distance < (canvas.width/7) * (canvas.height/7)) {
                        opacityValue = 1 - (distance/20000);
                        ctx.strokeStyle = 'rgba(166, 192, 254,' + opacityValue + ')'; // Connection color
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        init();
        animate();
    </script>
</body>
</html>
